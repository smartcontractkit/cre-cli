server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    # Defer upstream DNS (staging/dev hosts may be unreachable at container start).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        default_type text/html;
    }

    location = /wallet.html {
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    location ~ \.(js|mjs)$ {
        default_type application/javascript;
        add_header Cache-Control "no-store";
    }

    location ~ \.css$ {
        default_type text/css;
        add_header Cache-Control "no-store";
    }

    location ~ \.wasm$ {
        default_type application/wasm;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

  # Avoid browser CORS — paths match lib/cre-env.js PROXY_PREFIX (CRE_CLI_ENV).
    # rewrite + proxy_pass (no URI suffix): strip /cre-* prefix before upstream.
    location /cre-api/ {
        rewrite ^/cre-api/(.*)$ /$1 break;
        proxy_pass https://api.cre.chain.link;
        proxy_ssl_server_name on;
        proxy_set_header Host api.cre.chain.link;
    }

    location /cre-auth/ {
        rewrite ^/cre-auth/(.*)$ /$1 break;
        proxy_pass https://login.chain.link;
        proxy_ssl_server_name on;
        proxy_set_header Host login.chain.link;
    }

    location /cre-api-staging/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $cre_staging_api graphql-cre-stage.tailf8f749.ts.net;
        rewrite ^/cre-api-staging/(.*)$ /$1 break;
        proxy_pass https://$cre_staging_api;
        proxy_ssl_server_name on;
        proxy_set_header Host graphql-cre-stage.tailf8f749.ts.net;
    }

    location /cre-auth-staging/ {
        rewrite ^/cre-auth-staging/(.*)$ /$1 break;
        proxy_pass https://login-stage.cre.cldev.cloud;
        proxy_ssl_server_name on;
        proxy_set_header Host login-stage.cre.cldev.cloud;
    }

    location /cre-api-dev/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $cre_dev_api graphql-cre-dev.tailf8f749.ts.net;
        rewrite ^/cre-api-dev/(.*)$ /$1 break;
        proxy_pass https://$cre_dev_api;
        proxy_ssl_server_name on;
        proxy_set_header Host graphql-cre-dev.tailf8f749.ts.net;
    }

    location /cre-auth-dev/ {
        rewrite ^/cre-auth-dev/(.*)$ /$1 break;
        proxy_pass https://login-dev.cre.cldev.cloud;
        proxy_ssl_server_name on;
        proxy_set_header Host login-dev.cre.cldev.cloud;
    }

    gzip on;
    gzip_types application/wasm application/json text/css application/javascript;
}
