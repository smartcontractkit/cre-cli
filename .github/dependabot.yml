version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "go"
    groups:
      # Batch low-risk minor + patch bumps into a single weekly PR.
      go-minor-and-patch:
        update-types:
          - "minor"
          - "patch"